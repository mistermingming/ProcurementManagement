<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数据库管理</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --fg: #1f1c16;
      --muted: #6f675d;
      --card: #fffdf9;
      --accent: #115e59;
      --accent-2: #c0762b;
      --line: #e3dbcf;
      --shadow: 0 20px 40px rgba(41, 28, 13, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Serif CJK SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
      color: var(--fg);
      background: radial-gradient(circle at 15% 15%, #fff6e6 0%, #f4efe7 40%, #efe8dc 100%);
    }
    header {
      padding: 40px 6vw 16px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    p.sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    main {
      padding: 12px 6vw 60px;
      display: grid;
      gap: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
    }
    .card header {
      padding: 0 0 12px;
    }
    .card h2 {
      margin: 0;
      font-size: 20px;
    }
    .card .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 12px;
    }
    button {
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button.secondary {
      background: #efe6d7;
      color: var(--fg);
      border: 1px solid var(--line);
    }
    button.warn {
      background: var(--accent-2);
    }
    button:active {
      transform: translateY(1px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      text-align: left;
    }
    th {
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    tr:last-child td {
      border-bottom: none;
    }
    input, select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd2c1;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .grid-note {
      font-size: 12px;
      color: var(--muted);
      margin: 6px 0 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f1e6d5;
      color: #6b4d2a;
      font-size: 11px;
      margin-left: 8px;
    }
    .empty {
      text-align: center;
      padding: 20px 0;
      color: var(--muted);
    }
    .generator-subrow > td {
      background: #fcf7ee;
      padding: 10px 8px;
    }
    .sub-block {
      border: 1px dashed #dbcbb3;
      border-radius: 10px;
      padding: 10px;
      background: #fffaf2;
    }
    .sub-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .sub-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .sub-table th,
    .sub-table td {
      border-bottom: 1px solid #eadfcf;
      padding: 6px;
      text-align: left;
    }
    .sub-empty {
      color: var(--muted);
      text-align: center;
      padding: 10px 0;
      font-size: 12px;
    }
    @media (max-width: 900px) {
      header {
        padding: 28px 20px 8px;
      }
      main {
        padding: 12px 20px 40px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>数据库管理台</h1>
    <p class="sub">批量维护各表数据。频率为固定值，仅展示不可编辑。</p>
  </header>
  <main id="app"></main>

  <script>
    const TABLES = [
      {
        key: "frequency",
        label: "频率",
        readonly: true,
        columns: [{ key: "value", label: "频率值", type: "text" }],
        note: "固定为 50hz / 60hz，不需要修改。",
      },
      {
        key: "voltage",
        label: "电压",
        columns: [
          { key: "frequency", label: "频率", type: "frequency" },
          { key: "voltage", label: "电压值", type: "text" },
        ],
      },
      {
        key: "phase",
        label: "相数",
        columns: [{ key: "value", label: "相数值", type: "text" }],
      },
      {
        key: "engine",
        label: "发动机",
        columns: [
          { key: "frequency", label: "频率", type: "frequency" },
          { key: "brand", label: "品牌", type: "text" },
          { key: "model", label: "型号", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "generator",
        label: "发电机",
        columns: [
          { key: "frequency", label: "频率", type: "frequency" },
          { key: "brand", label: "品牌", type: "text" },
          { key: "model", label: "型号", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "generator_tank",
        label: "发电机-水箱",
        columns: [
          { key: "generator_id", label: "发电机", type: "generator" },
          { key: "tank_value", label: "水箱名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
        note: "同一水箱名称在不同发电机下可配置不同价格。",
      },
      {
        key: "control_system",
        label: "控制系统",
        columns: [
          { key: "name", label: "名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "switch",
        label: "开关",
        columns: [
          { key: "name", label: "名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "base",
        label: "底座",
        columns: [
          { key: "name", label: "名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "battery",
        label: "电池",
        columns: [
          { key: "name", label: "名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "silencer",
        label: "消音器",
        columns: [
          { key: "name", label: "名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
      {
        key: "elbow",
        label: "弯头",
        columns: [
          { key: "name", label: "名称", type: "text" },
          { key: "price", label: "价格", type: "price" },
        ],
      },
    ];

    const app = document.getElementById("app");
    let metaCache = null;

    async function fetchMeta() {
      const res = await fetch("/api/meta");
      if (!res.ok) throw new Error("无法读取元数据");
      metaCache = await res.json();
      return metaCache;
    }

    async function fetchTable(key) {
      const res = await fetch(`/api/table?name=${encodeURIComponent(key)}`);
      if (!res.ok) throw new Error("无法读取表数据");
      return res.json();
    }

    async function saveTable(key, rows) {
      const res = await fetch(`/api/table?name=${encodeURIComponent(key)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rows }),
      });
      const payload = await res.json();
      if (!res.ok) {
        throw new Error(payload.error || "保存失败");
      }
      return payload;
    }

    function createSelect(options, value) {
      const select = document.createElement("select");
      options.forEach((opt) => {
        const option = document.createElement("option");
        option.value = opt.value;
        option.textContent = opt.label;
        if (opt.value === value) option.selected = true;
        select.appendChild(option);
      });
      return select;
    }

    function buildRowInputs(table, row = {}) {
      const inputs = {};
      table.columns.forEach((col) => {
        let input;
        if (col.type === "frequency") {
          const options = (metaCache.frequency || []).map((value) => ({
            value,
            label: value,
          }));
          input = createSelect(options, row[col.key] || options[0]?.value || "");
        } else if (col.type === "generator") {
          const options = (metaCache.generators || []).map((item) => ({
            value: String(item.id),
            label: `#${item.id} ${item.frequency} ${item.brand} ${item.model}`,
          }));
          input = createSelect(options, row[col.key] ? String(row[col.key]) : options[0]?.value || "");
        } else {
          input = document.createElement("input");
          input.type = "text";
          if (col.type === "price") {
            input.inputMode = "decimal";
          }
          input.value = row[col.key] != null ? row[col.key] : "";
        }
        inputs[col.key] = input;
      });
      return inputs;
    }

    function readRowValues(table, inputs) {
      const row = {};
      table.columns.forEach((col) => {
        row[col.key] = inputs[col.key].value;
      });
      return row;
    }

    function renderTableCard(table, rows) {
      const card = document.createElement("section");
      card.className = "card";

      const header = document.createElement("header");
      const title = document.createElement("h2");
      title.textContent = table.label;
      header.appendChild(title);
      if (table.readonly) {
        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = "只读";
        title.appendChild(pill);
      }
      if (table.note) {
        const note = document.createElement("div");
        note.className = "meta";
        note.textContent = table.note;
        header.appendChild(note);
      }
      card.appendChild(header);

      const toolbar = document.createElement("div");
      toolbar.className = "toolbar";

      const addBtn = document.createElement("button");
      addBtn.textContent = "新增一行";
      addBtn.className = "secondary";

      const saveBtn = document.createElement("button");
      saveBtn.textContent = "保存全部";

      const reloadBtn = document.createElement("button");
      reloadBtn.textContent = "重新加载";
      reloadBtn.className = "secondary";

      if (!table.readonly) {
        toolbar.appendChild(addBtn);
        toolbar.appendChild(saveBtn);
        toolbar.appendChild(reloadBtn);
      }
      card.appendChild(toolbar);

      const tableEl = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      table.columns.forEach((col) => {
        const th = document.createElement("th");
        th.textContent = col.label;
        headRow.appendChild(th);
      });
      const thAction = document.createElement("th");
      thAction.textContent = "操作";
      headRow.appendChild(thAction);
      thead.appendChild(headRow);
      tableEl.appendChild(thead);

      const tbody = document.createElement("tbody");
      tableEl.appendChild(tbody);

      const status = document.createElement("div");
      status.className = "status";
      status.textContent = "";

      function collectDraftRows() {
        return Array.from(tbody.querySelectorAll("tr"))
          .filter((tr) => tr._inputs)
          .map((tr) => readRowValues(table, tr._inputs));
      }

      function renderRows(currentRows) {
        tbody.innerHTML = "";
        if (!currentRows.length) {
          const emptyRow = document.createElement("tr");
          const td = document.createElement("td");
          td.colSpan = table.columns.length + 1;
          td.className = "empty";
          td.textContent = "暂无数据";
          emptyRow.appendChild(td);
          tbody.appendChild(emptyRow);
          return;
        }
        currentRows.forEach((row, index) => {
          const inputs = buildRowInputs(table, row);
          const tr = document.createElement("tr");
          table.columns.forEach((col) => {
            const td = document.createElement("td");
            td.appendChild(inputs[col.key]);
            tr.appendChild(td);
          });
          const tdActions = document.createElement("td");
          const actions = document.createElement("div");
          actions.className = "row-actions";
          const delBtn = document.createElement("button");
          delBtn.className = "warn";
          delBtn.textContent = "删除";
          delBtn.addEventListener("click", () => {
            const draftRows = collectDraftRows();
            draftRows.splice(index, 1);
            rows = draftRows;
            renderRows(rows);
          });
          if (!table.readonly) {
            actions.appendChild(delBtn);
          }
          tdActions.appendChild(actions);
          tr.appendChild(tdActions);
          tr._inputs = inputs;
          tbody.appendChild(tr);
        });
      }

      renderRows(rows);

      if (!table.readonly) {
        addBtn.addEventListener("click", () => {
          rows = collectDraftRows();
          rows.push({});
          renderRows(rows);
        });
        reloadBtn.addEventListener("click", async () => {
          status.textContent = "重新加载中...";
          try {
            const payload = await fetchTable(table.key);
            rows = payload.rows || [];
            renderRows(rows);
            status.textContent = "已重新加载";
          } catch (err) {
            status.textContent = err.message;
          }
        });
        saveBtn.addEventListener("click", async () => {
          const tableRows = collectDraftRows();
          status.textContent = "保存中...";
          try {
            const result = await saveTable(table.key, tableRows);
            status.textContent = `保存成功，写入 ${result.inserted} 行`;
            const payload = await fetchTable(table.key);
            rows = payload.rows || [];
            renderRows(rows);
            if (table.key === "generator_tank" || table.key === "generator") {
              await fetchMeta();
            }
          } catch (err) {
            status.textContent = `保存失败：${err.message}`;
          }
        });
      }

      card.appendChild(tableEl);
      card.appendChild(status);
      return card;
    }

    function renderGeneratorWithTankCard(generatorTable, generatorRows, tankTable, tankRows) {
      const card = document.createElement("section");
      card.className = "card";

      const header = document.createElement("header");
      const title = document.createElement("h2");
      title.textContent = generatorTable.label;
      header.appendChild(title);
      const note = document.createElement("div");
      note.className = "meta";
      note.textContent = "每条发电机下方可直接维护其水箱子类。";
      header.appendChild(note);
      card.appendChild(header);

      const toolbar = document.createElement("div");
      toolbar.className = "toolbar";
      const addBtn = document.createElement("button");
      addBtn.textContent = "新增发电机";
      addBtn.className = "secondary";
      const saveBtn = document.createElement("button");
      saveBtn.textContent = "保存发电机及水箱";
      const reloadBtn = document.createElement("button");
      reloadBtn.textContent = "重新加载";
      reloadBtn.className = "secondary";
      toolbar.appendChild(addBtn);
      toolbar.appendChild(saveBtn);
      toolbar.appendChild(reloadBtn);
      card.appendChild(toolbar);

      const tableEl = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      generatorTable.columns.forEach((col) => {
        const th = document.createElement("th");
        th.textContent = col.label;
        headRow.appendChild(th);
      });
      const thAction = document.createElement("th");
      thAction.textContent = "操作";
      headRow.appendChild(thAction);
      thead.appendChild(headRow);
      tableEl.appendChild(thead);

      const tbody = document.createElement("tbody");
      tableEl.appendChild(tbody);
      card.appendChild(tableEl);

      const status = document.createElement("div");
      status.className = "status";
      card.appendChild(status);

      const tankColumns = tankTable.columns.filter((col) => col.key !== "generator_id");

      function collectGeneratorDrafts() {
        return Array.from(tbody.querySelectorAll("tr"))
          .filter((tr) => tr._inputs)
          .map((tr) => readRowValues(generatorTable, tr._inputs));
      }

      function collectTankDrafts() {
        return Array.from(tbody.querySelectorAll("tr"))
          .filter((tr) => tr._tankInputs)
          .map((tr) => {
            const values = {};
            tankColumns.forEach((col) => {
              values[col.key] = tr._tankInputs[col.key].value;
            });
            const generatorDraft = collectGeneratorDrafts()[tr._generatorIndex];
            let generatorId = generatorDraft?.id;
            if (generatorId == null) {
              const generatorData = generatorRows[tr._generatorIndex];
              generatorId = generatorData?.id;
            }
            return generatorId == null
              ? null
              : {
                  generator_id: String(generatorId),
                  ...values,
                };
          })
          .filter(Boolean);
      }

      function createTankInput(col, value) {
        const input = document.createElement("input");
        input.type = "text";
        if (col.type === "price") {
          input.inputMode = "decimal";
        }
        input.value = value != null ? value : "";
        return input;
      }

      function renderRows() {
        tbody.innerHTML = "";
        if (!generatorRows.length) {
          const emptyRow = document.createElement("tr");
          const td = document.createElement("td");
          td.colSpan = generatorTable.columns.length + 1;
          td.className = "empty";
          td.textContent = "暂无发电机数据";
          emptyRow.appendChild(td);
          tbody.appendChild(emptyRow);
          return;
        }

        generatorRows.forEach((generatorRow, index) => {
          const generatorId = generatorRow.id;
          const mainTr = document.createElement("tr");
          const inputs = buildRowInputs(generatorTable, generatorRow);
          generatorTable.columns.forEach((col) => {
            const td = document.createElement("td");
            td.appendChild(inputs[col.key]);
            mainTr.appendChild(td);
          });
          const actionTd = document.createElement("td");
          const actions = document.createElement("div");
          actions.className = "row-actions";
          const delBtn = document.createElement("button");
          delBtn.className = "warn";
          delBtn.textContent = "删除";
          delBtn.addEventListener("click", () => {
            const draftGenerators = collectGeneratorDrafts();
            const draftTanks = collectTankDrafts();
            const removed = draftGenerators.splice(index, 1)[0];
            generatorRows = draftGenerators;
            if (removed && removed.id != null) {
              tankRows = draftTanks.filter((item) => String(item.generator_id) !== String(removed.id));
            } else {
              tankRows = draftTanks;
            }
            renderRows();
          });
          actions.appendChild(delBtn);
          actionTd.appendChild(actions);
          mainTr.appendChild(actionTd);
          mainTr._inputs = inputs;
          mainTr._generatorIndex = index;
          tbody.appendChild(mainTr);

          const subTr = document.createElement("tr");
          subTr.className = "generator-subrow";
          const subTd = document.createElement("td");
          subTd.colSpan = generatorTable.columns.length + 1;
          const subBlock = document.createElement("div");
          subBlock.className = "sub-block";

          const subTitle = document.createElement("div");
          subTitle.className = "sub-title";
          const subLabel = document.createElement("span");
          subLabel.textContent = `水箱子类（发电机第 ${index + 1} 条）`;
          subTitle.appendChild(subLabel);

          if (generatorId == null) {
            const tip = document.createElement("span");
            tip.textContent = "请先保存该发电机，再添加水箱";
            subTitle.appendChild(tip);
            subBlock.appendChild(subTitle);
          } else {
            const addTankBtn = document.createElement("button");
            addTankBtn.textContent = "新增水箱";
            addTankBtn.className = "secondary";
            addTankBtn.addEventListener("click", () => {
              generatorRows = collectGeneratorDrafts();
              tankRows = collectTankDrafts();
              tankRows.push({
                generator_id: String(generatorId),
                tank_value: "",
                price: "",
              });
              renderRows();
            });
            subTitle.appendChild(addTankBtn);
            subBlock.appendChild(subTitle);

            const subTable = document.createElement("table");
            subTable.className = "sub-table";
            const subHead = document.createElement("thead");
            const subHeadRow = document.createElement("tr");
            tankColumns.forEach((col) => {
              const th = document.createElement("th");
              th.textContent = col.label;
              subHeadRow.appendChild(th);
            });
            const subActionHead = document.createElement("th");
            subActionHead.textContent = "操作";
            subHeadRow.appendChild(subActionHead);
            subHead.appendChild(subHeadRow);
            subTable.appendChild(subHead);

            const subBody = document.createElement("tbody");
            const linkedTanks = tankRows.filter((item) => String(item.generator_id) === String(generatorId));
            if (!linkedTanks.length) {
              const emptyTankRow = document.createElement("tr");
              const td = document.createElement("td");
              td.colSpan = tankColumns.length + 1;
              td.className = "sub-empty";
              td.textContent = "暂无水箱数据";
              emptyTankRow.appendChild(td);
              subBody.appendChild(emptyTankRow);
            } else {
              linkedTanks.forEach((tankRow) => {
                const tankTr = document.createElement("tr");
                const tankInputs = {};
                tankColumns.forEach((col) => {
                  const td = document.createElement("td");
                  const input = createTankInput(col, tankRow[col.key]);
                  tankInputs[col.key] = input;
                  td.appendChild(input);
                  tankTr.appendChild(td);
                });
                const tankActionTd = document.createElement("td");
                const tankActions = document.createElement("div");
                tankActions.className = "row-actions";
                const delTankBtn = document.createElement("button");
                delTankBtn.className = "warn";
                delTankBtn.textContent = "删除";
                delTankBtn.addEventListener("click", () => {
                  generatorRows = collectGeneratorDrafts();
                  const draftTanks = collectTankDrafts();
                  const currentTank = {
                    generator_id: String(generatorId),
                    ...Object.fromEntries(
                      tankColumns.map((col) => [col.key, tankInputs[col.key].value])
                    ),
                  };
                  let removed = false;
                  tankRows = draftTanks.filter((item) => {
                    if (removed) return true;
                    const same = tankColumns.every(
                      (col) => String(item[col.key]) === String(currentTank[col.key])
                    ) && String(item.generator_id) === String(currentTank.generator_id);
                    if (same) {
                      removed = true;
                      return false;
                    }
                    return true;
                  });
                  renderRows();
                });
                tankActions.appendChild(delTankBtn);
                tankActionTd.appendChild(tankActions);
                tankTr.appendChild(tankActionTd);
                tankTr._tankInputs = tankInputs;
                tankTr._generatorIndex = index;
                subBody.appendChild(tankTr);
              });
            }
            subTable.appendChild(subBody);
            subBlock.appendChild(subTable);
          }

          subTd.appendChild(subBlock);
          subTr.appendChild(subTd);
          tbody.appendChild(subTr);
        });
      }

      renderRows();

      addBtn.addEventListener("click", () => {
        generatorRows = collectGeneratorDrafts();
        tankRows = collectTankDrafts();
        generatorRows.push({});
        renderRows();
      });

      reloadBtn.addEventListener("click", async () => {
        status.textContent = "重新加载中...";
        try {
          const [generatorPayload, tankPayload] = await Promise.all([
            fetchTable(generatorTable.key),
            fetchTable(tankTable.key),
          ]);
          generatorRows = generatorPayload.rows || [];
          tankRows = tankPayload.rows || [];
          renderRows();
          status.textContent = "已重新加载";
        } catch (err) {
          status.textContent = err.message;
        }
      });

      saveBtn.addEventListener("click", async () => {
        status.textContent = "保存中...";
        try {
          const generatorDrafts = Array.from(tbody.querySelectorAll("tr"))
            .filter((tr) => tr._inputs)
            .map((tr) => ({
              index: tr._generatorIndex,
              values: readRowValues(generatorTable, tr._inputs),
            }));
          await saveTable(generatorTable.key, generatorDrafts.map((item) => item.values));
          await fetchMeta();
          const freshGeneratorsPayload = await fetchTable(generatorTable.key);
          const freshGenerators = freshGeneratorsPayload.rows || [];

          const tankDrafts = Array.from(tbody.querySelectorAll("tr"))
            .filter((tr) => tr._tankInputs)
            .map((tr) => {
              const values = {};
              tankColumns.forEach((col) => {
                values[col.key] = tr._tankInputs[col.key].value;
              });
              return { generatorIndex: tr._generatorIndex, values };
            });
          const tankPayload = tankDrafts
            .map((item) => {
              const generator = freshGenerators[item.generatorIndex];
              if (!generator || generator.id == null) return null;
              return {
                generator_id: String(generator.id),
                ...item.values,
              };
            })
            .filter(Boolean);
          const tankResult = await saveTable(tankTable.key, tankPayload);

          const [generatorPayload, tankRowsPayload] = await Promise.all([
            fetchTable(generatorTable.key),
            fetchTable(tankTable.key),
          ]);
          generatorRows = generatorPayload.rows || [];
          tankRows = tankRowsPayload.rows || [];
          renderRows();
          status.textContent = `保存成功，发电机 ${generatorRows.length} 条，水箱写入 ${tankResult.inserted} 行`;
        } catch (err) {
          status.textContent = `保存失败：${err.message}`;
        }
      });

      return card;
    }

    async function init() {
      app.innerHTML = "";
      try {
        await fetchMeta();
      } catch (err) {
        app.textContent = "无法读取元数据，请确认服务已启动。";
        return;
      }

      const generatorTable = TABLES.find((table) => table.key === "generator");
      const tankTable = TABLES.find((table) => table.key === "generator_tank");

      for (const table of TABLES) {
        if (table.key === "generator_tank") continue;
        if (table.key === "generator" && generatorTable && tankTable) {
          const [generatorPayload, tankPayload] = await Promise.all([
            fetchTable(generatorTable.key),
            fetchTable(tankTable.key),
          ]);
          app.appendChild(
            renderGeneratorWithTankCard(
              generatorTable,
              generatorPayload.rows || [],
              tankTable,
              tankPayload.rows || []
            )
          );
          continue;
        }
        const payload = await fetchTable(table.key);
        const rows = payload.rows || [];
        app.appendChild(renderTableCard(table, rows));
      }
    }

    init();
  </script>
</body>
</html>
